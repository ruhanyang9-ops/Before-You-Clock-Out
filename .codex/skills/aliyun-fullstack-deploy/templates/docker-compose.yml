services:
  app:
    image: node:24-bookworm-slim
    container_name: {{APP_NAME}}
    working_dir: /app
    command: sh -c "{{INSTALL_COMMAND}} && {{BUILD_COMMAND}} && {{START_COMMAND}}"
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:{{PORT}}:{{PORT}}"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./data:/app/data

