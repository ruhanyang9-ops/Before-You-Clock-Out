server {
    listen 80;
    listen [::]:80;

    server_name afterwork5.xyz www.afterwork5.xyz;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=()" always;

    # Keep this block HTTP-only first. After HTTPS is issued, Certbot can extend
    # this file or create the 443 server block automatically.
    location / {
        proxy_pass http://127.0.0.1:4173;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
